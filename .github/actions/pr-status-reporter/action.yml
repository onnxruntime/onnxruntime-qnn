name: 'PR Status Reporter'
description: 'Fetches PR details and reports commit status + check run'

inputs:
  pr_number:
    description: 'PR number to fetch details for'
    required: true
  status_context:
    description: 'Status context name (e.g., build-linux-x86_64-py3.12)'
    required: true
  status_state:
    description: 'Status state: pending, success, or failure'
    required: true
  status_description:
    description: 'Status description message'
    required: true

outputs:
  sha:
    description: 'PR head SHA'
    value: ${{ steps.report_status.outputs.sha }}
  ref:
    description: 'PR head ref'
    value: ${{ steps.report_status.outputs.ref }}

runs:
  using: 'composite'
  steps:
    - name: Get PR details and report status
      id: report_status
      uses: actions/github-script@v7
      with:
        script: |
          try {
            // Fetch PR details
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: parseInt('${{ inputs.pr_number }}')
            });

            const sha = pr.data.head.sha;
            const ref = pr.data.head.ref;
            const statusState = '${{ inputs.status_state }}';
            const statusContext = '${{ inputs.status_context }}';
            const statusDescription = '${{ inputs.status_description }}';

            console.log(`PR #${{ inputs.pr_number }}: SHA=${sha}, REF=${ref}`);

            // Set outputs
            core.setOutput('sha', sha);
            core.setOutput('ref', ref);

            // Map status state to check run format
            let checkStatus, checkConclusion;
            if (statusState === 'pending') {
              checkStatus = 'in_progress';
              checkConclusion = null;
            } else {
              checkStatus = 'completed';
              checkConclusion = statusState === 'success' ? 'success' : 'failure';
            }

            // Create commit status (shows at bottom of PR)
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: sha,
              state: statusState,
              context: statusContext,
              description: statusDescription,
              target_url: '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
            });

            console.log(`Commit status created: ${statusState} - ${statusDescription}`);

            // Create check run (shows in Checks tab)
            const checkRunParams = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: statusContext,
              head_sha: sha,
              status: checkStatus,
              details_url: '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}',
              output: {
                title: statusDescription,
                summary: `Status: ${statusState}\n\nContext: ${statusContext}`
              }
            };

            // Only set conclusion when completed
            if (checkConclusion !== null) {
              checkRunParams.conclusion = checkConclusion;
            }

            await github.rest.checks.create(checkRunParams);

            console.log(`Check run created: ${checkStatus}${checkConclusion ? ` (${checkConclusion})` : ''}`);
          } catch (error) {
            core.error(`Failed to fetch PR or report status: ${error.message}`);
            throw error;
          }
