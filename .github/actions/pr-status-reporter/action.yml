name: 'PR Status Reporter'
description: 'Fetches PR details and reports check run status'

inputs:
  pr_number:
    description: 'PR number to fetch details for'
    required: true
  status_context:
    description: 'Status context name (e.g., build-linux-x86_64-py3.12)'
    required: true
  status_state:
    description: 'Status state: pending, success, or failure'
    required: true
  status_description:
    description: 'Status description message'
    required: true

outputs:
  sha:
    description: 'PR head SHA'
    value: ${{ steps.report_status.outputs.sha }}
  ref:
    description: 'PR head ref'
    value: ${{ steps.report_status.outputs.ref }}

runs:
  using: 'composite'
  steps:
    - name: Get PR details and report status
      id: report_status
      uses: actions/github-script@v7
      with:
        script: |
          try {
            // Fetch PR details
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: parseInt('${{ inputs.pr_number }}')
            });

            const sha = pr.data.head.sha;
            const ref = pr.data.head.ref;
            const statusState = '${{ inputs.status_state }}';
            const statusContext = '${{ inputs.status_context }}';
            const statusDescription = '${{ inputs.status_description }}';

            console.log(`PR #${{ inputs.pr_number }}: SHA=${sha}, REF=${ref}`);

            // Set outputs
            core.setOutput('sha', sha);
            core.setOutput('ref', ref);

            // Fetch current check runs for the ref using direct REST API
            console.log(`\n=== Fetching Check Runs for SHA: ${sha} ===`);
            const checkRunsResponse = await github.request('GET /repos/{owner}/{repo}/commits/{ref}/check-runs', {
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: sha,
              headers: {
                'X-GitHub-Api-Version': '2022-11-28'
              }
            });

            console.log(`Total check runs found: ${checkRunsResponse.data.total_count}`);
            console.log(`\n=== Check Runs Details ===`);

            if (checkRunsResponse.data.check_runs.length === 0) {
              console.log('No check runs found for this commit.');
            } else {
              checkRunsResponse.data.check_runs.forEach((check, index) => {
                console.log(`\n--- Check Run ${index + 1} ---`);
                console.log(`Name: ${check.name}`);
                console.log(`ID: ${check.id}`);
                console.log(`Status: ${check.status}`);
                console.log(`Conclusion: ${check.conclusion || 'N/A'}`);
                console.log(`Started: ${check.started_at || 'N/A'}`);
                console.log(`Completed: ${check.completed_at || 'N/A'}`);
                console.log(`URL: ${check.html_url}`);
                console.log(`App: ${check.app?.name || 'N/A'} (ID: ${check.app?.id || 'N/A'})`);
              });
            }
            console.log(`\n=== End Check Runs ===\n`);

            // Fetch current check suites for the ref using direct REST API
            console.log(`\n=== Fetching Check Suites for SHA: ${sha} ===`);
            const checkSuitesResponse = await github.request('GET /repos/{owner}/{repo}/commits/{ref}/check-suites', {
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: sha,
              headers: {
                'X-GitHub-Api-Version': '2022-11-28'
              }
            });

            console.log(`Total check suites found: ${checkSuitesResponse.data.total_count}`);
            console.log(`\n=== Check Suites Details ===`);

            if (checkSuitesResponse.data.check_suites.length === 0) {
              console.log('No check suites found for this commit.');
            } else {
              checkSuitesResponse.data.check_suites.forEach((suite, index) => {
                console.log(`\n--- Check Suite ${index + 1} ---`);
                console.log(`ID: ${suite.id}`);
                console.log(`Status: ${suite.status}`);
                console.log(`Conclusion: ${suite.conclusion || 'N/A'}`);
                console.log(`Head Branch: ${suite.head_branch}`);
                console.log(`Head SHA: ${suite.head_sha}`);
                console.log(`Created: ${suite.created_at || 'N/A'}`);
                console.log(`Updated: ${suite.updated_at || 'N/A'}`);
                console.log(`URL: ${suite.url}`);
                console.log(`App: ${suite.app?.name || 'N/A'} (ID: ${suite.app?.id || 'N/A'})`);
              });
            }
            console.log(`\n=== End Check Suites ===\n`);

            // Create commit status
            console.log(`Creating commit status: ${statusContext} - ${statusState}`);
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: sha,
              state: statusState,
              target_url: '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}',
              description: statusDescription,
              context: statusContext
            });

            console.log(`Commit status created: ${statusContext} - ${statusState}`);
          } catch (error) {
            core.error(`Failed to fetch PR or report status: ${error.message}`);
            throw error;
          }
