name: Qualcomm Internal PR Workflow

permissions:
  contents: read
  checks: write
  pull-requests: write
  actions: read
  statuses: write

on:
  issue_comment:
    types: [created]
  # Allow this workflow to be run manually from the Actions tab for testing
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to test (required for testing comment trigger behavior)'
        required: true
        type: number

# only one active job per PR. this will cause jobs to be immediately cancelled on subsequent pushes in PRs.
# ref: https://docs.github.com/en/actions/using-jobs/using-concurrency#example-using-a-fallback-value
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  check-trigger:
    name: Check Comment Trigger
    if: github.event_name == 'issue_comment' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      pr_number: ${{ steps.check.outputs.pr_number }}
      pr_sha: ${{ steps.check.outputs.pr_sha }}
      pr_ref: ${{ steps.check.outputs.pr_ref }}
    steps:
      - name: Check if comment triggers CI
        id: check
        run: |
          # Handle workflow_dispatch events (for testing comment trigger behavior)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Triggered by workflow_dispatch - emulating /test comment"
            PR_NUMBER="${{ github.event.inputs.pr_number }}"

            # Fetch PR details
            PR_DATA=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}/pulls/${PR_NUMBER}")

            PR_TITLE=$(echo "$PR_DATA" | jq -r '.title')
            PR_SHA=$(echo "$PR_DATA" | jq -r '.head.sha')
            PR_REF=$(echo "$PR_DATA" | jq -r '.head.ref')

            echo "Testing PR #${PR_NUMBER}: ${PR_TITLE}"
            echo "Head SHA: ${PR_SHA}"
            echo "Head ref: ${PR_REF}"

            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "pr_number=${PR_NUMBER}" >> $GITHUB_OUTPUT
            echo "pr_sha=${PR_SHA}" >> $GITHUB_OUTPUT
            echo "pr_ref=${PR_REF}" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Handle issue_comment events
          # Check if this is a PR (not a regular issue)
          if [ "${{ github.event.issue.pull_request }}" = "" ]; then
            echo "Not a pull request, skipping"
            echo "should_run=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Check if comment contains "/test"
          COMMENT_BODY="${{ github.event.comment.body }}"
          if ! echo "$COMMENT_BODY" | grep -qE '(^/test$|^/test\s|\s/test$|\s/test\s)'; then
            echo "Comment does not contain '/test', skipping"
            echo "should_run=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Check author association
          AUTHOR_ASSOC="${{ github.event.comment.author_association }}"
          if [ "$AUTHOR_ASSOC" != "OWNER" ] && [ "$AUTHOR_ASSOC" != "MEMBER" ]; then
            echo "User is not an owner or member (association: ${AUTHOR_ASSOC}), skipping"
            echo "should_run=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Fetch PR details
          PR_NUMBER="${{ github.event.issue.number }}"
          PR_DATA=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/pulls/${PR_NUMBER}")

          PR_TITLE=$(echo "$PR_DATA" | jq -r '.title')
          PR_SHA=$(echo "$PR_DATA" | jq -r '.head.sha')
          PR_REF=$(echo "$PR_DATA" | jq -r '.head.ref')

          echo "PR #${PR_NUMBER}: ${PR_TITLE}"
          echo "Head SHA: ${PR_SHA}"
          echo "Head ref: ${PR_REF}"

          echo "should_run=true" >> $GITHUB_OUTPUT
          echo "pr_number=${PR_NUMBER}" >> $GITHUB_OUTPUT
          echo "pr_sha=${PR_SHA}" >> $GITHUB_OUTPUT
          echo "pr_ref=${PR_REF}" >> $GITHUB_OUTPUT

      - name: Add rocket reaction
        if: steps.check.outputs.should_run == 'true' && github.event_name == 'issue_comment'
        run: |
          curl --request POST \
            --url https://api.github.com/repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            --header 'authorization: Bearer ${{ secrets.GITHUB_TOKEN }}' \
            --header 'content-type: application/json' \
            --header 'Accept: application/vnd.github.v3+json' \
            --data '{"content":"rocket"}' \
            --fail

  build-and-test-all:
    name: Build & Test
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' && needs.check-trigger.outputs.should_run == 'true')
    needs: [check-trigger]
    uses: ./.github/workflows/qualcomm-internal-build-and-test.yml
    secrets: inherit
    with:
      do_all: true
      pr_ref: ${{ needs.check-trigger.outputs.pr_ref }}
      pr_sha: ${{ needs.check-trigger.outputs.pr_sha }}
