name: Qualcomm Internal PR Workflow

permissions:
  contents: read
  checks: write
  pull-requests: write

on:
  issue_comment:
    types: [created]
  # Allow this workflow to be run manually from the Actions tab
  workflow_dispatch:

# only one active job per PR. this will cause jobs to be immediately cancelled on subsequent pushes in PRs.
# ref: https://docs.github.com/en/actions/using-jobs/using-concurrency#example-using-a-fallback-value
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  check-trigger:
    name: Check Comment Trigger
    if: github.event_name == 'issue_comment'
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      pr_number: ${{ steps.check.outputs.pr_number }}
      pr_sha: ${{ steps.check.outputs.pr_sha }}
      pr_ref: ${{ steps.check.outputs.pr_ref }}
    steps:
      - name: Check if comment triggers CI
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            // Check if this is a PR (not a regular issue)
            if (!context.payload.issue.pull_request) {
              console.log("Not a pull request, skipping");
              core.setOutput('should_run', 'false');
              return;
            }

            // Check if comment contains "/test"
            const comment = context.payload.comment.body;
            if (!comment.match(/^\/test$|^\/test\s|\s\/test$|\s\/test\s/)) {
              console.log("Comment does not contain '/test', skipping");
              core.setOutput('should_run', 'false');
              return;
            }

            const authorAssociation = context.payload.comment.author_association;
            if (authorAssociation !== 'OWNER' && authorAssociation !== 'MEMBER') {
              console.log(`User is not an owner or member (association: ${authorAssociation}), skipping`);
              core.setOutput('should_run', 'false');
              return;
            }

            // Fetch PR details
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            console.log(`PR #${pr.data.number}: ${pr.data.title}`);
            console.log(`Head SHA: ${pr.data.head.sha}`);
            console.log(`Head ref: ${pr.data.head.ref}`);

            core.setOutput('should_run', 'true');
            core.setOutput('pr_number', pr.data.number.toString());
            core.setOutput('pr_sha', pr.data.head.sha);
            core.setOutput('pr_ref', pr.data.head.ref);

      - name: Add rocket reaction
        if: steps.check.outputs.should_run == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket'
            });

  create-pending-status:
    name: Create Pending Status
    if: |
      github.event_name == 'issue_comment' && needs.check-trigger.outputs.should_run == 'true'
    needs: [check-trigger]
    runs-on: ubuntu-latest
    steps:
      - name: Create pending commit status
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: '${{ needs.check-trigger.outputs.pr_sha }}',
              state: 'pending',
              target_url: '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}',
              description: 'Build and test jobs are running...',
              context: 'Qualcomm Internal PR Workflow / Build & Test'
            });

  build-and-test-all:
    name: Build & Test
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' && needs.check-trigger.outputs.should_run == 'true')
    needs: [check-trigger]
    uses: ./.github/workflows/qualcomm-internal-build-and-test.yml
    secrets: inherit
    with:
      do_all: true
      pr_sha: ${{ needs.check-trigger.outputs.pr_sha }}
      pr_ref: ${{ needs.check-trigger.outputs.pr_ref }}

  update-final-status:
    name: Update Final Status
    if: |
      always() &&
      github.event_name == 'issue_comment' &&
      needs.check-trigger.outputs.should_run == 'true'
    needs: [check-trigger, create-pending-status, build-and-test-all]
    runs-on: ubuntu-latest
    steps:
      - name: Update commit status
        uses: actions/github-script@v7
        with:
          script: |
            const conclusion = '${{ needs.build-and-test-all.result }}';
            let state, description;

            if (conclusion === 'success') {
              state = 'success';
              description = 'All build and test jobs completed successfully';
            } else if (conclusion === 'failure') {
              state = 'failure';
              description = 'One or more build/test jobs failed';
            } else if (conclusion === 'cancelled') {
              state = 'error';
              description = 'Build and test jobs were cancelled';
            } else {
              state = 'error';
              description = `Build and test jobs completed with status: ${conclusion}`;
            }

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: '${{ needs.check-trigger.outputs.pr_sha }}',
              state: state,
              target_url: '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}',
              description: description,
              context: 'Qualcomm Internal PR Workflow / Build & Test'
            });
