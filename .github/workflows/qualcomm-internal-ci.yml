name: Qualcomm Internal PR Workflow

permissions:
  contents: read
  checks: write
  pull-requests: write
  actions: read
  statuses: write

on:
  issue_comment:
    types: [created]
  # Allow this workflow to be run manually from the Actions tab
  workflow_dispatch:

# only one active job per PR. this will cause jobs to be immediately cancelled on subsequent pushes in PRs.
# ref: https://docs.github.com/en/actions/using-jobs/using-concurrency#example-using-a-fallback-value
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  check-trigger:
    name: Check Comment Trigger
    if: github.event_name == 'issue_comment'
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      pr_number: ${{ steps.check.outputs.pr_number }}
      pr_sha: ${{ steps.check.outputs.pr_sha }}
      pr_ref: ${{ steps.check.outputs.pr_ref }}
    steps:
      - name: Check if comment triggers CI
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            // Check if this is a PR (not a regular issue)
            if (!context.payload.issue.pull_request) {
              console.log("Not a pull request, skipping");
              core.setOutput('should_run', 'false');
              return;
            }

            // Check if comment contains "/test"
            const comment = context.payload.comment.body;
            if (!comment.match(/^\/test$|^\/test\s|\s\/test$|\s\/test\s/)) {
              console.log("Comment does not contain '/test', skipping");
              core.setOutput('should_run', 'false');
              return;
            }

            const authorAssociation = context.payload.comment.author_association;
            if (authorAssociation !== 'OWNER' && authorAssociation !== 'MEMBER') {
              console.log(`User is not an owner or member (association: ${authorAssociation}), skipping`);
              core.setOutput('should_run', 'false');
              return;
            }

            // Fetch PR details
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            console.log(`PR #${pr.data.number}: ${pr.data.title}`);
            console.log(`Head SHA: ${pr.data.head.sha}`);
            console.log(`Head ref: ${pr.data.head.ref}`);

            core.setOutput('should_run', 'true');
            core.setOutput('pr_number', pr.data.number.toString());
            core.setOutput('pr_sha', pr.data.head.sha);
            core.setOutput('pr_ref', pr.data.head.ref);

      - name: Add rocket reaction
        if: steps.check.outputs.should_run == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket'
            });

  build-and-test-all:
    name: Build & Test
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' && needs.check-trigger.outputs.should_run == 'true')
    needs: [check-trigger]
    uses: ./.github/workflows/qualcomm-internal-build-and-test.yml
    secrets: inherit
    with:
      do_all: true
      pr_ref: ${{ needs.check-trigger.outputs.pr_ref }}

  monitor-status:
    name: Monitor Build Status
    if: |
      github.event_name == 'issue_comment' && needs.check-trigger.outputs.should_run == 'true'
    needs: [check-trigger]
    runs-on: ubuntu-latest
    steps:
      - name: Find and monitor build workflow
        uses: actions/github-script@v7
        with:
          script: |
            const prSha = '${{ needs.check-trigger.outputs.pr_sha }}';
            const workflowFileName = 'qualcomm-internal-build-and-test.yml';
            const pollInterval = 30000; // 30 seconds
            const maxPolls = 240; // 2 hours max

            // Job name mapping to status context names
            const jobContextMap = {
              'build-linux-x86_64-py3.10': 'build-linux-x86_64-py3.10',
              'build-linux-aarch64_oe_gcc11_2-pynone': 'build-linux-aarch64_oe_gcc11_2-pynone',
              'build-windows-arm64-pynone': 'build-windows-arm64-pynone',
              'build-windows-arm64ec-py3.12': 'build-windows-arm64ec-py3.12',
              'build-windows-x86_64-py3.12': 'build-windows-x86_64-py3.12',
              'test-windows-arm64-pynone': 'test-windows-arm64-pynone',
              'test-windows-arm64ec-py3.12': 'test-windows-arm64ec-py3.12',
              'test-windows-x86_64-py3.12': 'test-windows-x86_64-py3.12',
              'test-linux-x86_64-py3.10': 'test-linux-x86_64-py3.10',
              'lint': 'lint',
              'build-android-aarch64': 'build-android-aarch64'
            };

            console.log('Waiting for build workflow to start...');
            await new Promise(resolve => setTimeout(resolve, 10000));

            // Find the build-and-test workflow run
            let buildWorkflowRun = null;
            const startTime = Date.now();

            for (let attempt = 0; attempt < 30; attempt++) {
              const { data: runs } = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: workflowFileName,
                per_page: 20
              });

              // Find the most recent run that started around the same time as this workflow
              buildWorkflowRun = runs.workflow_runs.find(run => {
                const runAge = Date.now() - new Date(run.created_at).getTime();
                return runAge < 120000 && run.status !== 'completed'; // Within 2 minutes and not completed
              });

              if (buildWorkflowRun) {
                console.log(`Found build workflow run ${buildWorkflowRun.id}`);
                break;
              }

              console.log(`Attempt ${attempt + 1}/30: Build workflow not found yet, waiting...`);
              await new Promise(resolve => setTimeout(resolve, 2000));
            }

            if (!buildWorkflowRun) {
              console.log('ERROR: Could not find build workflow run after 30 attempts');
              return;
            }

            const workflowRunId = buildWorkflowRun.id;
            console.log(`Starting to monitor workflow run ${workflowRunId}`);
            console.log(`Reporting statuses on commit ${prSha}`);

            const trackedJobs = new Map();
            let pollCount = 0;
            let allJobsComplete = false;

            while (!allJobsComplete && pollCount < maxPolls) {
              pollCount++;
              console.log(`\n=== Poll ${pollCount}/${maxPolls} ===`);

              try {
                // Fetch workflow run jobs
                const { data: { jobs } } = await github.rest.actions.listJobsForWorkflowRun({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  run_id: workflowRunId,
                  per_page: 100
                });

                console.log(`Found ${jobs.length} jobs`);

                // Check if all jobs are complete
                allJobsComplete = jobs.every(job =>
                  job.status === 'completed' || job.conclusion !== null
                );

                // Process each job
                for (const job of jobs) {
                  const jobName = job.name;
                  const jobStatus = job.status;
                  const jobConclusion = job.conclusion;

                  // Find matching context name
                  let contextName = null;
                  for (const [pattern, context] of Object.entries(jobContextMap)) {
                    if (jobName.includes(pattern) || jobName === pattern) {
                      contextName = context;
                      break;
                    }
                  }

                  // Skip jobs we don't track
                  if (!contextName) {
                    continue;
                  }

                  // Check if status changed
                  const previousState = trackedJobs.get(contextName);
                  const currentState = jobStatus === 'completed' ? jobConclusion : jobStatus;

                  if (previousState !== currentState) {
                    console.log(`Job "${jobName}" (${contextName}): ${previousState || 'new'} -> ${currentState}`);
                    trackedJobs.set(contextName, currentState);

                    // Map job status to commit status
                    let state, description;
                    if (jobStatus === 'queued') {
                      state = 'pending';
                      description = 'Queued...';
                    } else if (jobStatus === 'in_progress') {
                      state = 'pending';
                      description = 'Running...';
                    } else if (jobStatus === 'completed') {
                      if (jobConclusion === 'success') {
                        state = 'success';
                        description = 'Completed successfully';
                      } else if (jobConclusion === 'failure') {
                        state = 'failure';
                        description = 'Failed';
                      } else if (jobConclusion === 'cancelled') {
                        state = 'error';
                        description = 'Cancelled';
                      } else if (jobConclusion === 'skipped') {
                        state = 'error';
                        description = 'Skipped';
                      } else {
                        state = 'error';
                        description = `Completed with status: ${jobConclusion}`;
                      }
                    } else {
                      state = 'pending';
                      description = `Status: ${jobStatus}`;
                    }

                    // Create commit status
                    await github.rest.repos.createCommitStatus({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      sha: prSha,
                      state: state,
                      target_url: job.html_url,
                      description: description,
                      context: contextName
                    });

                    console.log(`  ✓ Updated status: ${state} - ${description}`);
                  }
                }

                if (allJobsComplete) {
                  console.log('\n✓ All jobs complete, stopping monitor');
                  break;
                }

                // Wait before next poll
                await new Promise(resolve => setTimeout(resolve, pollInterval));

              } catch (error) {
                console.error(`Error during poll ${pollCount}:`, error.message);
                // Continue polling despite errors
              }
            }

            if (pollCount >= maxPolls) {
              console.log('\n⚠ Maximum poll count reached, stopping monitor');
            }

            console.log(`\nFinal status summary:`);
            for (const [context, state] of trackedJobs.entries()) {
              console.log(`  ${context}: ${state}`);
            }
