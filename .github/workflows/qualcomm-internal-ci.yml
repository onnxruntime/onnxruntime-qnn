name: Qualcomm Internal PR Workflow
on:
  push:
    branches: [main, rel-*]
  pull_request:
    branches: [main, rel-*]
  merge_group:
    types: [checks_requested]

  # Allow this workflow to be run manually from the Actions tab
  workflow_dispatch:

# only one active job per PR. this will cause jobs to be immediately cancelled on subsequent pushes in PRs.
# ref: https://docs.github.com/en/actions/using-jobs/using-concurrency#example-using-a-fallback-value
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build-and-test-all:
    name: Build & Test
    uses: ./.github/workflows/qualcomm-internal-build-and-test.yml
    secrets: inherit
    with:
      do_linux_x86_64: ${{ vars.DO_LINUX_X86_64 == '' || vars.DO_LINUX_X86_64 != '0' }}
      do_linux_aarch64: ${{ vars.DO_LINUX_AARCH64 == '' || vars.DO_LINUX_AARCH64 != '0' }}
      do_windows_arm64: ${{ vars.DO_WINDOWS_ARM64 == '' || vars.DO_WINDOWS_ARM64 != '0' }}
      do_windows_arm64ec: ${{ vars.DO_WINDOWS_ARM64EC == '' || vars.DO_WINDOWS_ARM64EC != '0' }}
      do_windows_arm64x: ${{ vars.DO_WINDOWS_ARM64X == '' || vars.DO_WINDOWS_ARM64X != '0' }}
      do_windows_x86_64: ${{ vars.DO_WINDOWS_X86_64 == '' || vars.DO_WINDOWS_X86_64 != '0' }}
      do_android: ${{ vars.DO_ANDROID == '' || vars.DO_ANDROID != '0' }}
      do_lint: ${{ vars.DO_LINT == '' || vars.DO_LINT != '0' }}
