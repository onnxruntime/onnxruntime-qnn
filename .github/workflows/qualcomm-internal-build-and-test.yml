name: Qualcomm Internal Build & Test

permissions:
  checks: write
  contents: read
  pull-requests: read
  statuses: write

on:
  workflow_call:
    inputs:
      do_all:
        type: boolean
        default: true
      do_linux_x86_64:
        type: boolean
        default: false
      do_windows_arm64:
        type: boolean
        default: false
      # If true, build with NIGHTLY_BUILD=1, etc. to enable --nightly_build
      nightly_build:
        type: boolean
        default: true
      # Cross-compiling from X64 to ARM64 is faster with our runners, but cannot produce a wheel.
      windows_arm64_runner_arch:
        type: string
        default: "X64"
      target_py_vsn:
        default: "3.12"
        type: string
      pr_number:
        description: "PR number for fetching PR details"
        type: string
        default: ""

env:
  ORT_NIGHTLY_BUILD: "${{ inputs.nightly_build == true && '1' || '0' }}"

jobs:
  create-suite:
    if: ${{ inputs.pr_number != '' }}
    runs-on: ubuntu-latest
    outputs:
      suite_id: ${{ steps.create.outputs.suite_id }}
    steps:
      - uses: actions/checkout@v4

      - name: Create check suite
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            // Fetch PR details
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: parseInt('${{ inputs.pr_number }}')
            });

            const sha = pr.data.head.sha;
            console.log(`Creating check suite for PR #${{ inputs.pr_number }}, SHA=${sha}`);

            // Create check suite
            const suite = await github.rest.checks.createSuite({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head_sha: sha
            });

            const suiteId = suite.data.id;
            console.log(`Check suite created: ${suiteId}`);
            core.setOutput('suite_id', suiteId);

  build-and-test-linux-x86_64:
    needs: [create-suite]
    if: ${{ always() && inputs.do_all }}
    uses: ./.github/workflows/qualcomm-internal-build-and-test-single-os.yml
    secrets: inherit
    with:
      nightly_build: ${{ inputs.nightly_build }}
      target_os: linux
      target_arch: x86_64
      # Specifying a python version here doesn't actually do anything at this point since we don't know what the Linux
      # wheel distribution story is yet. For now, this is just so that all of the job and artifact names reflect the
      # version of cpython that's installed on our Linux build machines.
      target_py_vsn: "3.10"
      pr_number: ${{ inputs.pr_number }}
      suite_id: ${{ needs.create-suite.outputs.suite_id }}

  build-linux-aarch64-oe-gcc11_2:
      needs: [create-suite]
      if: ${{ always() && inputs.do_all }}
      uses: ./.github/workflows/qualcomm-internal-build-and-test-single-os.yml
      secrets: inherit
      with:
        nightly_build: ${{ inputs.nightly_build }}
        target_os: linux
        target_arch: aarch64_oe_gcc11_2
        target_py_vsn: None
        upload_test_archive: true
        upload_wheel: false
        run_tests: false
        pr_number: ${{ inputs.pr_number }}
        suite_id: ${{ needs.create-suite.outputs.suite_id }}

  # TODO: [AISW-167150] Cannot use HTP on QDC qcs6490
  #test-linux-aarch64-oe-gcc11_2:
  #  if: ${{ inputs.do_all }}
  #  needs: [build-linux-aarch64-oe-gcc11_2]
  #  uses: ./.github/workflows/qualcomm-internal-qdc-test.yml
  #  secrets: inherit
  #  with:
  #    target_os: linux
  #    target_arch: aarch64_oe_gcc11_2

  # TODO: Re-enable test_ort_windows_arm64_pysmoke and test_ort_windows_arm64_pygpu
  #       once Python Wheel for Plugin EP library is completed
  build-and-test-windows-arm64:
    needs: [create-suite]
    if: ${{ always() && (inputs.do_all || inputs.do_windows_arm64) }}
    uses: ./.github/workflows/qualcomm-internal-build-and-test-single-os.yml
    secrets: inherit
    with:
      nightly_build: ${{ inputs.nightly_build }}
      build_runner_arch: ${{ inputs.windows_arm64_runner_arch }}
      target_arch: arm64
      upload_wheel: ${{ inputs.windows_arm64_runner_arch == 'ARM64' }}
      target_py_vsn: ${{ inputs.windows_arm64_runner_arch == 'ARM64' && inputs.target_py_vsn || 'None' }}
      test_runner_arch: arm64
      pr_number: ${{ inputs.pr_number }}
      suite_id: ${{ needs.create-suite.outputs.suite_id }}

  build-and-test-windows-arm64ec:
    needs: [create-suite]
    if: ${{ always() && inputs.do_all }}
    uses: ./.github/workflows/qualcomm-internal-build-and-test-single-os.yml
    secrets: inherit
    with:
      nightly_build: ${{ inputs.nightly_build }}
      target_arch: arm64ec
      upload_wheel: true
      # test_wheel: true  # Smoke tests are broken with new plugin EP
      target_py_vsn: ${{ inputs.target_py_vsn }}
      run_tests: false  # ARM64ec unit tests are horribly broken (though model tests seem fine).
      test_runner_arch: arm64
      pr_number: ${{ inputs.pr_number }}
      suite_id: ${{ needs.create-suite.outputs.suite_id }}

  build-and-test-windows-x86_64:
    needs: [create-suite]
    if: ${{ always() && inputs.do_all }}
    uses: ./.github/workflows/qualcomm-internal-build-and-test-single-os.yml
    secrets: inherit
    with:
      nightly_build: ${{ inputs.nightly_build }}
      target_arch: x86_64
      target_py_vsn: ${{ inputs.target_py_vsn }}
      pr_number: ${{ inputs.pr_number }}
      suite_id: ${{ needs.create-suite.outputs.suite_id }}

  lint:
    needs: [create-suite]
    if: ${{ always() && inputs.do_all }}
    runs-on: ["self-hosted", "X64", "Linux", "Build"]
    steps:
      - name: Get PR details
        if: inputs.pr_number != ''
        id: pr_details
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: parseInt('${{ inputs.pr_number }}')
            });
            core.setOutput('ref', pr.data.head.ref);
            core.setOutput('sha', pr.data.head.sha);

      - uses: actions/checkout@v4
        with:
          submodules: recursive
          ref: ${{ inputs.pr_number != '' && steps.pr_details.outputs.ref || github.ref }}

      - name: Report pending status
        if: inputs.pr_number != ''
        uses: ./.github/actions/pr-status-reporter
        with:
          pr_number: ${{ inputs.pr_number }}
          status_context: 'lint'
          status_state: 'in_progress'
          status_description: 'Running linter...'
          suite_id: ${{ needs.create-suite.outputs.suite_id }}

      - name: Run Linting Tool
        run: |
          python3 qcom/build_and_test.py lint

      - name: Report final status
        if: always() && inputs.pr_number != ''
        uses: ./.github/actions/pr-status-reporter
        with:
          pr_number: ${{ inputs.pr_number }}
          status_context: 'lint'
          status_state: ${{ job.status == 'success' && 'success' || 'failure' }}
          status_description: ${{ job.status == 'success' && 'Linting passed' || 'Linting failed' }}
          suite_id: ${{ needs.create-suite.outputs.suite_id }}

  build-android-aarch64:
    needs: [create-suite]
    if: ${{ always() && inputs.do_all }}
    runs-on: ["self-hosted", "X64", "Linux", "Build"]
    steps:
      - name: Get PR details
        if: inputs.pr_number != ''
        id: pr_details
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: parseInt('${{ inputs.pr_number }}')
            });
            core.setOutput('ref', pr.data.head.ref);
            core.setOutput('sha', pr.data.head.sha);

      - uses: actions/checkout@v4
        with:
          submodules: recursive
          ref: ${{ inputs.pr_number != '' && steps.pr_details.outputs.ref || github.ref }}

      - name: Report pending status
        if: inputs.pr_number != ''
        uses: ./.github/actions/pr-status-reporter
        with:
          pr_number: ${{ inputs.pr_number }}
          status_context: 'build-android-aarch64'
          status_state: 'in_progress'
          status_description: 'Building Android...'
          suite_id: ${{ needs.create-suite.outputs.suite_id }}

      - name: Build Android
        run: |
          python3 qcom/build_and_test.py archive_ort_android_aarch64

      - uses: actions/upload-artifact@v4
        with:
          name: ORT android aarch64 pynone Tests
          path: |
            ${{ github.workspace }}/build/onnxruntime-tests-android-aarch64.zip

      - name: Report final status
        if: always() && inputs.pr_number != ''
        uses: ./.github/actions/pr-status-reporter
        with:
          pr_number: ${{ inputs.pr_number }}
          status_context: 'build-android-aarch64'
          status_state: ${{ job.status == 'success' && 'success' || 'failure' }}
          status_description: ${{ job.status == 'success' && 'Android build succeeded' || 'Android build failed' }}
          suite_id: ${{ needs.create-suite.outputs.suite_id }}

 # Intentionally not "test-android-aarch64" to avoid breaking required PR checks
  test-android:
    if: ${{ inputs.do_all }}
    needs: [build-android-aarch64]
    uses: ./.github/workflows/qualcomm-internal-qdc-test.yml
    secrets: inherit
    with:
      target_os: android
      target_arch: aarch64
