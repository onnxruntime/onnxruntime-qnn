name: Publish of ONNX Runtime Execution Provider wheel, nuget and zip on each RC

permissions:
  checks: write
  contents: read
  id-token: write

on:
  workflow_dispatch:
    inputs:
      version_suffix:
        description: "Version suffix for released package. If set, the specified suffix will be appended to the version string."
        type: string
        default: "rc0"

jobs:
  check-admin-permission:
    name: Check if user is admin
    runs-on: ["self-hosted", "Linux", "X64"]
    steps:
      - name: Verify admin permission
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const { data: permission } = await github.rest.repos.getCollaboratorPermissionLevel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                username: context.actor
              });

              console.log(`User: ${context.actor}`);
              console.log(`Permission level: ${permission.permission}`);

              if (permission.permission !== 'admin') {
                core.setFailed(
                  `Access denied. Only repository administrators can trigger this workflow. Your permission level: ${permission.permission}`
                );
              } else {
                console.log('Admin permission verified');
              }
            } catch (error) {
              core.setFailed(`Failed to check permissions: ${error.message}`);
            }

  publish-artifacts:
    name: Publish artifacts
    needs: check-admin-permission
    uses: ./.github/workflows/qualcomm-internal-upload-artifactory-from-github.yml
    secrets: inherit
    with:
      nightly_build: false
      skip_publish: false
      version_suffix: ${{ inputs.version_suffix }}
